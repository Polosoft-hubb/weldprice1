name: metall_estimate
description: A new Flutter application for construction and welding project estimates.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/weldprice_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/materials_db.json
    - assets/weldprice_icon.png
